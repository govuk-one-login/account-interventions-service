---
name: 'Run Feature Tests'

on:
  workflow_dispatch:
    inputs:
      gitRef:
        description: 'Input branch name, commit SHA, or tag'
        required: true
        type: string
        default: main

permissions:
  contents: read

jobs:
  run_tests:
    name: 'Run Tests'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6.0.2
        with:
          ref: ${{ inputs.gitRef }}

      - name: Setup NodeJS
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # pin@v6.3.0
        with:
          node-version-file: '.node-version'
          cache: npm

      - name: Run npm install
        working-directory: feature-tests
        run: npm ci

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # pin@6.0.0
        with:
          role-to-assume: ${{ secrets.DEV_MAIN_GH_ACTIONS_ROLE_ARN }}
          aws-region: eu-west-2

      - name: 'Run tests'
        working-directory: feature-tests
        run: npm test
