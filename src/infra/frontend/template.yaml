AWSTemplateFormatVersion: '2010-09-09'
Transform:
  - AWS::Serverless-2016-10-31
  - AWS::LanguageExtensions

Metadata:
  cfn-lint:
    config:
      ignore_checks:
        - E3031
        - E3510
        - E3033

Description: >-
  The Frontend layer for the Account Interventions Service (AIS) solution

Parameters:
  Environment:
    Description: The name of the environment to deploy to
    Type: String
    AllowedValues:
      - dev
      - build
      - staging
      - integration
      - production
    Default: dev
  ApiStageName:
    Description: The stage name of the API
    Type: String
    Default: v1
  StagePrefix:
    Description: >-
      The URL path prefix for the API stage, used for asset URLs in templates.
      Set to /v1 when behind API Gateway without a custom domain.
      Set to empty string when a custom domain with base path mapping is in use.
    Type: String
    Default: /v1
  VpcStackName:
    Description: The name of the stack that defines the VPC
    Type: String
    Default: vpc
    AllowedPattern: ^[a-z0-9-]+$
  MainStackName:
    Description: The name of the main AIS stack, used to import the PrivateApi RestApiId
    Type: String
    Default: ais-main
    AllowedPattern: ^[a-z0-9-]+$
  PermissionsBoundary:
    Description: The ARN of the permissions boundary to apply when creating IAM roles
    Type: String
    Default: none
  CSLSSubscriptionEndpointArn:
    Type: String
    Description: CSLS Subscription endpoint
    Default: 'arn:aws:logs:eu-west-2:885513274347:destination:csls_cw_logs_destination_prodpython-2'
  CodeSigningConfigArn:
    Description: Asserts that lambdas are signed when deployed.
    Type: String
    Default: none
  ProductTagValue:
    Description: Value for the Product Tag
    Type: String
    Default: GOV.UK One Login
  SystemTagValue:
    Description: Value for the System Tag
    Type: String
    Default: Account Interventions Service
  OwnerTagValue:
    Description: Value for the Owner Tag
    Type: String
    Default: interventions@digital.cabinet-office.gov.uk
  SourceTagValue:
    Description: Value for the Source Tag
    Type: String
    Default: govuk-one-login/account-interventions-service/src/infra/frontend/template.yaml

Conditions:
  UsePermissionsBoundary: !Not [!Equals [!Ref PermissionsBoundary, 'none']]
  UseCodeSigning: !Not [!Equals [!Ref CodeSigningConfigArn, 'none']]
  IsDevBuildStaging:
    !Or [!Equals [!Ref Environment, dev], !Equals [!Ref Environment, build], !Equals [!Ref Environment, staging]]
  IsInternal: !Or [!Equals [!Ref Environment, dev], !Equals [!Ref Environment, build]]

Mappings:
  EnvConfig:
    dev:
      LambdaLogLevel: DEBUG
      DynatraceSecretArn: arn:aws:secretsmanager:eu-west-2:216552277552:secret:DynatraceNonProductionVariables # pragma: allowlist secret
    build:
      LambdaLogLevel: INFO
      DynatraceSecretArn: arn:aws:secretsmanager:eu-west-2:216552277552:secret:DynatraceNonProductionVariables # pragma: allowlist secret
    staging:
      LambdaLogLevel: INFO
      DynatraceSecretArn: arn:aws:secretsmanager:eu-west-2:216552277552:secret:DynatraceNonProductionVariables # pragma: allowlist secret
    integration:
      LambdaLogLevel: INFO
      DynatraceSecretArn: arn:aws:secretsmanager:eu-west-2:216552277552:secret:DynatraceNonProductionVariables # pragma: allowlist secret
    production:
      LambdaLogLevel: INFO
      DynatraceSecretArn: arn:aws:secretsmanager:eu-west-2:216552277552:secret:DynatraceProductionVariables # pragma: allowlist secret
  FeatureFlags:
    dev:
      EnableAISFrontend: true
      EnableAISSendTxMA: true
    build:
      EnableAISFrontend: false
      EnableAISSendTxMA: false
    staging:
      EnableAISFrontend: false
      EnableAISSendTxMA: false
    integration:
      EnableAISFrontend: false
      EnableAISSendTxMA: false
    production:
      EnableAISFrontend: false
      EnableAISSendTxMA: false

Globals:
  Function:
    Runtime: nodejs24.x
    Architectures:
      - arm64
    Tracing: Active
    AutoPublishAlias: live
    CodeUri: ../../../dist/frontend
    KmsKeyArn: !GetAtt LambdaEnvironmentVariableEncryptionKey.Arn
    Environment:
      Variables:
        POWERTOOLS_LOG_LEVEL: !FindInMap [EnvConfig, !Ref Environment, LambdaLogLevel]
        POWERTOOLS_SERVICE_NAME: !Ref AWS::StackName
        CLOUDWATCH_METRICS_NAMESPACE: !Ref SystemTagValue
        AWS_LAMBDA_EXEC_WRAPPER: /opt/dynatrace
        DT_CONNECTION_AUTH_TOKEN: !Sub
          - '{{resolve:secretsmanager:${SecretArn}:SecretString:DT_CONNECTION_AUTH_TOKEN}}' # pragma: allowlist secret
          - SecretArn: !FindInMap [EnvConfig, !Ref Environment, DynatraceSecretArn]
        DT_CONNECTION_BASE_URL: !Sub
          - '{{resolve:secretsmanager:${SecretArn}:SecretString:DT_CONNECTION_BASE_URL}}' # pragma: allowlist secret
          - SecretArn: !FindInMap [EnvConfig, !Ref Environment, DynatraceSecretArn]
        DT_CLUSTER_ID: !Sub
          - '{{resolve:secretsmanager:${SecretArn}:SecretString:DT_CLUSTER_ID}}' # pragma: allowlist secret
          - SecretArn: !FindInMap [EnvConfig, !Ref Environment, DynatraceSecretArn]
        DT_LOG_COLLECTION_AUTH_TOKEN: !Sub
          - '{{resolve:secretsmanager:${SecretArn}:SecretString:DT_LOG_COLLECTION_AUTH_TOKEN}}' # pragma: allowlist secret
          - SecretArn: !FindInMap [EnvConfig, !Ref Environment, DynatraceSecretArn]
        DT_TENANT: !Sub
          - '{{resolve:secretsmanager:${SecretArn}:SecretString:DT_TENANT}}' # pragma: allowlist secret
          - SecretArn: !FindInMap [EnvConfig, !Ref Environment, DynatraceSecretArn]
        DT_OPEN_TELEMETRY_ENABLE_INTEGRATION: 'true'
        AWS_XRAY_CONTEXT_MISSING: 'IGNORE_ERROR'
    VpcConfig:
      SubnetIds:
        - Fn::ImportValue: !Sub ${VpcStackName}-ProtectedSubnetIdA
        - Fn::ImportValue: !Sub ${VpcStackName}-ProtectedSubnetIdB
        - Fn::ImportValue: !Sub ${VpcStackName}-ProtectedSubnetIdC
      SecurityGroupIds:
        - Fn::ImportValue: !Sub ${VpcStackName}-AWSServicesEndpointSecurityGroupId
    Layers: #Dynatrace lambda layer
      - arn:aws:lambda:eu-west-2:216552277552:layer:Dynatrace_OneAgent_1_329_73_20260123-140641_with_collector_nodejs_arm:1

Resources:
  ### Frontend Lambda ###

  FrontendFunction:
    Type: AWS::Serverless::Function
    Condition: IsDevBuildStaging
    # checkov:skip=CKV_AWS_116: DLQ is not appropriate for a Lambda invoked by an API
    # checkov:skip=CKV_AWS_115: Function is not configured for function-level concurrent execution limit
    Properties:
      FunctionName: !Sub '${AWS::StackName}-FrontendFunction'
      Description: 'Serves the AIS frontend web interface.'
      Handler: frontend-handler.handler
      MemorySize: 256
      Timeout: 10
      Role: !GetAtt FrontendFunctionRole.Arn
      CodeSigningConfigArn: !If [UseCodeSigning, !Ref CodeSigningConfigArn, !Ref AWS::NoValue]
      Environment:
        Variables:
          STAGE_PREFIX: !Ref StagePrefix
          STATUS_API_URL: !Sub
            - 'https://${PrivateApiId}.execute-api.${AWS::Region}.amazonaws.com/main'
            - PrivateApiId:
                Fn::ImportValue: !Sub '${MainStackName}-PrivateApiRestApiId'
          ENABLE_AIS_FRONTEND: !FindInMap [FeatureFlags, !Ref Environment, EnableAISFrontend]
          ENABLE_AIS_SEND_TXMA: !FindInMap [FeatureFlags, !Ref Environment, EnableAISSendTxMA]
          TXMA_QUEUE_URL: !If
            - IsInternal
            - Fn::ImportValue: !Sub '${MainStackName}-TxMAIngressSqsQueueUrl'
            - !Ref 'AWS::NoValue'
            # - Fn::ImportValue: !Sub '${MainStackName}-TxMAEgressSqsQueueUrl'
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref FrontendApi
            Path: /{proxy+}
            Method: ANY
        RootApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref FrontendApi
            Path: /
            Method: GET
      Tags:
        CheckovRulesToSkip: CKV_AWS_116.CKV_AWS_115
        Product: !Ref ProductTagValue
        System: !Ref SystemTagValue
        Environment: !Ref Environment
        Owner: !Ref OwnerTagValue
        Source: !Ref SourceTagValue

  FrontendFunctionRole:
    Type: AWS::IAM::Role
    Condition: IsDevBuildStaging
    Properties:
      RoleName: !Sub '${AWS::StackName}-FrontendFunctionRole'
      Description: !Sub 'The role assumed by ${AWS::StackName}-FrontendFunction'
      PermissionsBoundary: !If [UsePermissionsBoundary, !Ref PermissionsBoundary, !Ref AWS::NoValue]
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSXrayWriteOnlyAccess
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Tags:
        - Key: Product
          Value: !Ref ProductTagValue
        - Key: System
          Value: !Ref SystemTagValue
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref OwnerTagValue
        - Key: Source
          Value: !Ref SourceTagValue

  FrontendFunctionManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Condition: IsDevBuildStaging
    Properties:
      ManagedPolicyName: !Sub '${AWS::StackName}-FrontendFunctionPolicy'
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'logs:CreateLogStream'
              - 'logs:PutLogEvents'
            Resource:
              - !GetAtt FrontendFunctionLogGroup.Arn
          - Effect: Allow
            Action:
              - 'execute-api:Invoke'
            Resource:
              - !Sub
                - 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PrivateApiId}/main/*'
                - PrivateApiId:
                    Fn::ImportValue: !Sub '${MainStackName}-PrivateApiRestApiId'
          - Effect: Allow
            Action:
              - 'sqs:SendMessage'
            Resource: !If
              - IsInternal
              - Fn::ImportValue: !Sub '${MainStackName}-TxMAIngressSqsQueueArn'
              - !Ref 'AWS::NoValue'
              # - Fn::ImportValue: !Sub '${MainStackName}-TxMAEgressSqsQueueArn'
          - Effect: Allow
            Action:
              - 'kms:Decrypt'
              - 'kms:GenerateDataKey'
            Resource:
              Fn::ImportValue: !Sub '${MainStackName}-SQSEncryptionKeyArn'
      Roles:
        - !Ref FrontendFunctionRole

  FrontendFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: IsDevBuildStaging
    Properties:
      LogGroupName: !Sub '/aws/lambda/${AWS::StackName}-FrontendFunction'
      RetentionInDays: 30
      KmsKeyId: !GetAtt CloudWatchEncryptionKey.Arn
      Tags:
        - Key: Product
          Value: !Ref ProductTagValue
        - Key: System
          Value: !Ref SystemTagValue
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref OwnerTagValue
        - Key: Source
          Value: !Ref SourceTagValue
        - Key: Name
          Value: !Sub '/aws/lambda/${AWS::StackName}-FrontendFunction'

  FrontendFunctionLogsSubscriptionFilterCSLS:
    Type: AWS::Logs::SubscriptionFilter
    Condition: IsDevBuildStaging
    Properties:
      DestinationArn: !Ref CSLSSubscriptionEndpointArn
      LogGroupName: !Ref FrontendFunctionLogGroup
      FilterPattern: '{$.message != "Sensitive info*"}'

  FrontendApiGatewayPermission:
    Type: AWS::Lambda::Permission
    Condition: IsDevBuildStaging
    Properties:
      FunctionName: !Ref FrontendFunctionAliaslive
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${FrontendApi}/*/*'

  ### API Gateway ###

  FrontendApi:
    Type: AWS::Serverless::Api # NOSONAR(cloudformation:S6333) - intentionally public API, no authentication required
    Condition: IsDevBuildStaging
    Properties:
      # checkov:skip=CKV_AWS_120: API Gateway caching not enabled
      Name: !Sub '${AWS::StackName}-FrontendApi'
      AlwaysDeploy: true
      StageName: !Ref ApiStageName
      OpenApiVersion: 3.0.3
      PropagateTags: true
      Description: 'Public REST API for the AIS frontend'
      TracingEnabled: true
      CacheClusterEnabled: false
      AccessLogSetting:
        Format: >-
          {
          "requestId": "$context.requestId",
          "requestTime": "$context.requestTime",
          "httpMethod": "$context.httpMethod",
          "path": "$context.path",
          "status": "$context.status",
          "responseLength": "$context.responseLength",
          "responseLatency": "$context.responseLatency",
          "integrationLatency": "$context.integrationLatency",
          "integrationErrorMessage": "$context.integrationErrorMessage",
          "errorMessage": "$context.error.message"
          }
        DestinationArn: !GetAtt FrontendApiAccessLogGroup.Arn
      Tags:
        CheckovRulesToSkip: CKV_AWS_120
        Product: !Ref ProductTagValue
        System: !Ref SystemTagValue
        Environment: !Ref Environment
        Owner: !Ref OwnerTagValue
        Source: !Ref SourceTagValue
        FMSRegionalPolicy: False
        CustomPolicy: public

  FrontendApiAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: IsDevBuildStaging
    Properties:
      LogGroupName: !Sub '/aws/apigateway/${AWS::StackName}-FrontendApi/${ApiStageName}'
      RetentionInDays: 30
      KmsKeyId: !GetAtt CloudWatchEncryptionKey.Arn
      Tags:
        - Key: Product
          Value: !Ref ProductTagValue
        - Key: System
          Value: !Ref SystemTagValue
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref OwnerTagValue
        - Key: Source
          Value: !Ref SourceTagValue
        - Key: Name
          Value: !Sub '/aws/apigateway/${AWS::StackName}-FrontendApi/${ApiStageName}'

  FrontendApiLogsSubscriptionFilterCSLS:
    Type: AWS::Logs::SubscriptionFilter
    Condition: IsDevBuildStaging
    Properties:
      DestinationArn: !Ref CSLSSubscriptionEndpointArn
      LogGroupName: !Ref FrontendApiAccessLogGroup
      FilterPattern: ''

  ### Encryption Keys ###

  LambdaEnvironmentVariableEncryptionKey:
    Type: AWS::KMS::Key
    Condition: IsDevBuildStaging
    Properties:
      Description: 'KMS key used to encrypt lambda environment variables'
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'kms:Decrypt'
            Resource: '*'
            Condition:
              ArnLike:
                'aws:SourceArn': !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:*'
      Tags:
        - Key: Product
          Value: !Ref ProductTagValue
        - Key: System
          Value: !Ref SystemTagValue
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref OwnerTagValue
        - Key: Source
          Value: !Ref SourceTagValue
        - Key: Name
          Value: !Sub '${AWS::StackName}-LambdaEnvironmentVariableEncryptionKey'

  LambdaEnvironmentVariableEncryptionKeyAlias:
    Type: AWS::KMS::Alias
    Condition: IsDevBuildStaging
    Properties:
      AliasName: !Sub 'alias/${AWS::StackName}-LambdaEnvironmentVariableEncryptionKey'
      TargetKeyId: !GetAtt LambdaEnvironmentVariableEncryptionKey.Arn

  CloudWatchEncryptionKey:
    Type: AWS::KMS::Key
    Condition: IsDevBuildStaging
    Properties:
      Description: 'AWS KMS key for encrypting CloudWatch logs'
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Effect: Allow
            Principal:
              Service: !Sub 'logs.${AWS::Region}.amazonaws.com'
            Action:
              - 'kms:Encrypt*'
              - 'kms:Decrypt*'
              - 'kms:ReEncrypt*'
              - 'kms:GenerateDataKey*'
              - 'kms:Describe*'
            Resource: '*'
            Condition:
              ArnLike:
                'kms:EncryptionContext:aws:logs:arn': !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*'
      Tags:
        - Key: Product
          Value: !Ref ProductTagValue
        - Key: System
          Value: !Ref SystemTagValue
        - Key: Environment
          Value: !Ref Environment
        - Key: Owner
          Value: !Ref OwnerTagValue
        - Key: Source
          Value: !Ref SourceTagValue
        - Key: Name
          Value: !Sub '${AWS::StackName}-CloudWatchEncryptionKey'

  CloudWatchEncryptionKeyAlias:
    Type: AWS::KMS::Alias
    Condition: IsDevBuildStaging
    Properties:
      AliasName: !Sub 'alias/${AWS::StackName}-CloudWatchEncryptionKey'
      TargetKeyId: !GetAtt CloudWatchEncryptionKey.Arn

Outputs:
  FrontendApiEndpoint:
    Condition: IsDevBuildStaging
    Description: 'Frontend API Gateway endpoint URL'
    Value: !Sub 'https://${FrontendApi}.execute-api.${AWS::Region}.amazonaws.com/${ApiStageName}'
